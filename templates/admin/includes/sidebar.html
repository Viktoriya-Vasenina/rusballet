{% load static %}
<aside class="sidebar">
    <div class="sidebar-header">
        <h2>RUSBALLET</h2>
        <p>Админ-панель</p>
    </div>

    <nav class="sidebar-nav">
        <!-- ДАШБОРД с большим отступом после -->
        <div class="nav-section" style="margin-bottom: 30px;">
            <ul>
                <li class="{% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
                    <a href="{% url 'admin_dashboard' %}">
                        <i class="fas fa-tachometer-alt"></i> Дашборд
                    </a>
                </li>
            </ul>
        </div>

        <!-- БЛОК 1: Заявки, Ученики, Преподаватели -->
        <div class="nav-section" style="margin-bottom: 15px;">
            <ul>
                <li class="{% if request.resolver_match.url_name == 'admin_trial_bookings' %}active{% endif %}">
                    <a href="{% url 'admin_trial_bookings' %}">
                        <i class="fas fa-clock"></i> Заявки
                    </a>
                </li>
                <li class="{% if request.resolver_match.url_name == 'admin_students' %}active{% endif %}">
                    <a href="{% url 'admin_students' %}">
                        <i class="fas fa-user-graduate"></i> Ученики
                    </a>
                </li>
                <li class="{% if request.resolver_match.url_name == 'admin_teachers' %}active{% endif %}">
                    <a href="{% url 'admin_teachers' %}">
                        <i class="fas fa-chalkboard-teacher"></i> Преподаватели
                    </a>
                </li>
            </ul>
        </div>

        <!-- БЛОК 2: Группы, Расписание с отступом -->
        <div class="nav-section" style="margin-bottom: 30px;">
            <ul>
                <li class="{% if request.resolver_match.url_name == 'admin_groups' %}active{% endif %}">
                    <a href="{% url 'admin_groups' %}">
                        <i class="fas fa-layer-group"></i> Группы
                    </a>
                </li>
                <li class="{% if request.resolver_match.url_name == 'admin_schedule' %}active{% endif %}">
                    <a href="{% url 'admin_schedule' %}">
                        <i class="fas fa-calendar-alt"></i> Расписание
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Линия-разделитель и кнопка выхода внизу -->
    <div class="sidebar-footer" style="border-top: 1px solid rgba(255,255,255,0.1); padding: 20px 24px; margin-top: auto;">
        <a href="{% url 'admin_logout' %}" style="color: #94A3B8; text-decoration: none; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-sign-out-alt"></i> Выйти
        </a>
    </div>
</aside>
